plugins {
    id 'groovy'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.apache.groovy:groovy:4.0.20'
    implementation 'org.jsoup:jsoup:1.17.2'
    implementation 'io.github.http-builder-ng:http-builder-ng-core:1.0.4'
}

test {
    useJUnitPlatform()
}